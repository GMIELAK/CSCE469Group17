<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="auth-page" class="page">
    <div class="auth-container">
      <h1>Password Manager</h1>
      <div class="auth-tabs">
        <button id="login-tab" class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
        <button id="signup-tab" class="tab-btn" onclick="switchAuthTab('signup')">Sign Up</button>
      </div>

      <form id="login-form" class="auth-form active">
        <input type="text" id="login-username" placeholder="Username" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Login</button>
        <p id="login-error" class="error-msg"></p>
      </form>

      <form id="signup-form" class="auth-form">
        <input type="text" id="signup-username" placeholder="Username" required>
        <input type="password" id="signup-password" placeholder="Password" required>
        <input type="password" id="signup-confirm" placeholder="Confirm Password" required>
        <button type="submit">Sign Up</button>
        <p id="signup-error" class="error-msg"></p>
      </form>
    </div>
  </div>

  <div id="manager-page" class="page hidden">
    <div class="manager-container">
      <div class="header">
        <h1>Password Manager</h1>
        <div class="user-info">
          <span id="current-user">User</span>
          <button id="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="add-credential-section">
        <h2>Add New Credential</h2>
        <form id="add-cred-form">
          <div class="form-row">
            <input type="text" id="add-site" placeholder="Site/Service" required>
            <input type="text" id="add-username" placeholder="Username" required>
            <input type="password" id="add-password" placeholder="Password" required>
            <input type="text" id="add-notes" placeholder="Notes (optional)">
            <button type="submit">Add</button>
          </div>
          <p id="add-error" class="error-msg"></p>
        </form>
      </div>

      <div class="credentials-section">
        <h2>Saved Credentials</h2>
        <div id="credentials-table-container" class="table-container">
          <table id="credentials-table">
            <thead>
              <tr>
                <th>Site</th>
                <th>Username</th>
                <th>Password</th>
                <th>Notes</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="credentials-tbody">
            </tbody>
          </table>
          <p id="no-credentials" class="empty-msg">No credentials saved yet</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal hidden">
    <div class="modal-content">
      <span class="close" onclick="closeEditModal()">&times;</span>
      <h2>Edit Credential</h2>
      <form id="edit-cred-form">
        <input type="hidden" id="edit-cred-id">
        <input type="text" id="edit-site" placeholder="Site/Service" required>
        <input type="text" id="edit-username" placeholder="Username" required>
        <input type="password" id="edit-password" placeholder="Password" required>
        <input type="text" id="edit-notes" placeholder="Notes (optional)">
        <div class="modal-actions">
          <button type="submit">Save</button>
          <button type="button" onclick="closeEditModal()">Cancel</button>
        </div>
        <p id="edit-error" class="error-msg"></p>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
